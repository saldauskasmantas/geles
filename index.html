<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Flora Journal">
<meta name="theme-color" content="#2d4a2b">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' fill='%23f4f1ea'/><text x='90' y='135' text-anchor='middle' font-family='Georgia, serif' font-size='140' fill='%232d4a2b'>%E2%9D%A6</text></svg>">
<title>Flora Journal — Mantas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=JetBrains+Mono:wght@400;500&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f1ea;
  --bg-card: #faf8f2;
  --ink: #1a1d1a;
  --ink-soft: #4a4d48;
  --ink-mute: #8a8d87;
  --accent: #2d4a2b;
  --accent-soft: #5a7a4a;
  --rose: #a84a5f;
  --ochre: #b8843a;
  --line: #d9d4c5;
  --line-soft: #e8e3d4;
  --shadow: 0 1px 2px rgba(26,29,26,0.04), 0 8px 24px rgba(26,29,26,0.06);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Inter Tight', -apple-system, sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(circle at 20% 10%, rgba(45,74,43,0.04) 0%, transparent 40%),
                    radial-gradient(circle at 80% 90%, rgba(168,74,95,0.03) 0%, transparent 40%);
  pointer-events: none; z-index: 0;
}

.app { position: relative; z-index: 1; }

/* ——— HEADER ——— */
header.masthead {
  border-bottom: 1px solid var(--line);
  padding: 28px 32px 20px;
  background: var(--bg-card);
  position: sticky; top: 0; z-index: 50;
  backdrop-filter: blur(8px);
}
.mast-row { display: flex; justify-content: space-between; align-items: flex-end; gap: 24px; max-width: 1400px; margin: 0 auto; }
.brand { display: flex; flex-direction: column; }
.brand-sup { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-mute); margin-bottom: 6px; }
.brand-title { font-family: 'Fraunces', serif; font-weight: 400; font-size: 44px; line-height: 0.9; font-style: italic; letter-spacing: -0.02em; }
.brand-title span { font-style: normal; font-weight: 600; }
.brand-sub { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-soft); margin-top: 8px; letter-spacing: 0.05em; }

.mast-actions { display: flex; gap: 8px; align-items: center; }
.btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 10px 16px; border: 1px solid var(--line); border-radius: 2px;
  background: transparent; color: var(--ink); cursor: pointer;
  transition: all 0.2s;
}
.btn:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.btn.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.btn.primary:hover { background: var(--ink); border-color: var(--ink); }
.btn.danger:hover { background: var(--rose); color: var(--bg); border-color: var(--rose); }
.btn.small { padding: 6px 10px; font-size: 10px; }

/* ——— TABS ——— */
.tab-bar {
  display: flex; gap: 0; max-width: 1400px; margin: 0 auto;
  padding: 16px 32px 0; border-bottom: 1px solid var(--line);
  background: var(--bg-card);
}
.tab {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 14px 20px; cursor: pointer; color: var(--ink-mute);
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: all 0.2s;
}
.tab:hover { color: var(--ink); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-count { background: var(--line); color: var(--ink-soft); padding: 2px 6px; border-radius: 8px; font-size: 9px; margin-left: 6px; }
.tab.active .tab-count { background: var(--accent); color: var(--bg); }

/* ——— MAIN ——— */
main { max-width: 1400px; margin: 0 auto; padding: 32px; }
.view { display: none; }
.view.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ——— FLOWER GRID ——— */
.view-header {
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-bottom: 32px; padding-bottom: 20px; border-bottom: 1px solid var(--line-soft);
}
.view-title { font-family: 'Fraunces', serif; font-weight: 300; font-size: 32px; font-style: italic; letter-spacing: -0.01em; }
.view-title span { font-weight: 600; font-style: normal; }
.view-meta { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-mute); letter-spacing: 0.05em; }

.flower-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
.flower-card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: 3px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  position: relative;
}
.flower-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); border-color: var(--accent-soft); }
.card-image { height: 180px; background: linear-gradient(135deg, #c8d5be 0%, #a8ba9e 100%); position: relative; overflow: hidden; }
.card-image img { width: 100%; height: 100%; object-fit: cover; }
.card-image.empty::after {
  content: '❦'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-size: 48px; color: rgba(255,255,255,0.5); font-family: 'Fraunces', serif;
}
.card-body { padding: 20px; }
.card-species { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-mute); margin-bottom: 6px; }
.card-name { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 500; line-height: 1.1; margin-bottom: 12px; }
.card-meta { display: flex; gap: 16px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-soft); }
.card-meta span { display: flex; align-items: center; gap: 4px; }
.card-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-soft); }

.add-card {
  background: transparent; border: 1.5px dashed var(--line);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 320px; cursor: pointer; transition: all 0.3s;
}
.add-card:hover { border-color: var(--accent); background: var(--bg-card); }
.add-card-plus { font-family: 'Fraunces', serif; font-size: 56px; font-weight: 300; color: var(--ink-mute); line-height: 1; }
.add-card-text { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-mute); margin-top: 12px; }

/* ——— DETAIL VIEW ——— */
.detail-header { margin-bottom: 32px; }
.back-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--ink-mute); background: none; border: none; cursor: pointer;
  padding: 0; margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
}
.back-btn:hover { color: var(--ink); }

.detail-title-row { display: flex; justify-content: space-between; align-items: flex-end; gap: 24px; border-bottom: 1px solid var(--line); padding-bottom: 24px; }
.detail-species { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
.detail-name { font-family: 'Fraunces', serif; font-size: 56px; font-weight: 300; font-style: italic; line-height: 0.95; letter-spacing: -0.02em; }
.detail-name span { font-style: normal; font-weight: 600; }
.detail-actions { display: flex; gap: 8px; flex-shrink: 0; }

.sub-tabs {
  display: flex; gap: 2px; margin: 24px 0; padding: 4px;
  background: var(--line-soft); border-radius: 3px; width: fit-content;
}
.sub-tab {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 10px 16px; cursor: pointer; color: var(--ink-soft);
  border-radius: 2px; transition: all 0.2s;
}
.sub-tab.active { background: var(--bg-card); color: var(--accent); box-shadow: var(--shadow); }

.sub-view { display: none; }
.sub-view.active { display: block; animation: fadeIn 0.25s; }

/* ——— SECTION: TIMELINE ——— */
.timeline-wrap { display: grid; grid-template-columns: 1fr 320px; gap: 48px; }
@media (max-width: 900px) { .timeline-wrap { grid-template-columns: 1fr; } }

.timeline { position: relative; padding-left: 28px; }
.timeline::before { content: ''; position: absolute; left: 7px; top: 12px; bottom: 12px; width: 1px; background: var(--line); }
.tl-event { position: relative; margin-bottom: 28px; }
.tl-event::before {
  content: ''; position: absolute; left: -28px; top: 6px; width: 15px; height: 15px;
  border: 2px solid var(--accent); background: var(--bg); border-radius: 50%;
}
.tl-event.highlight::before { background: var(--accent); }
.tl-event-week { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.1em; color: var(--accent); font-weight: 500; margin-bottom: 4px; }
.tl-event-title { font-family: 'Fraunces', serif; font-size: 19px; font-weight: 500; margin-bottom: 4px; }
.tl-event-desc { font-size: 14px; color: var(--ink-soft); line-height: 1.5; }
.tl-event-date { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-mute); margin-top: 6px; }
.tl-event-actions { display: flex; gap: 8px; margin-top: 8px; opacity: 0; transition: opacity 0.2s; }
.tl-event:hover .tl-event-actions { opacity: 1; }
.tl-link { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-mute); cursor: pointer; text-decoration: underline; text-underline-offset: 3px; }
.tl-link:hover { color: var(--rose); }

.side-panel { background: var(--bg-card); border: 1px solid var(--line); border-radius: 3px; padding: 24px; height: fit-content; position: sticky; top: 140px; }
.side-panel h3 { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 500; margin-bottom: 16px; }
.stat-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed var(--line-soft); font-size: 13px; }
.stat-row:last-child { border-bottom: none; }
.stat-label { color: var(--ink-soft); font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
.stat-value { font-family: 'Fraunces', serif; font-weight: 600; }

/* ——— SECTION: NOTES ——— */
.note-composer { background: var(--bg-card); border: 1px solid var(--line); padding: 20px; margin-bottom: 24px; border-radius: 3px; }
.note-composer textarea {
  width: 100%; min-height: 80px; border: none; background: transparent; resize: vertical;
  font-family: 'Inter Tight', sans-serif; font-size: 15px; color: var(--ink); outline: none; line-height: 1.5;
}
.note-composer textarea::placeholder { color: var(--ink-mute); font-style: italic; }
.composer-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--line-soft); }
.composer-footer input[type="date"] { font-family: 'JetBrains Mono', monospace; font-size: 11px; border: 1px solid var(--line); padding: 6px 8px; background: var(--bg); color: var(--ink); border-radius: 2px; }

.note-list { display: flex; flex-direction: column; gap: 14px; }
.note {
  background: var(--bg-card); border-left: 3px solid var(--accent-soft); padding: 18px 20px;
  position: relative; border-radius: 0 3px 3px 0;
}
.note-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.note-date { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.1em; color: var(--ink-mute); text-transform: uppercase; }
.note-body { font-size: 15px; line-height: 1.55; color: var(--ink); white-space: pre-wrap; }
.note-delete { opacity: 0; transition: opacity 0.2s; }
.note:hover .note-delete { opacity: 1; }

/* ——— SECTION: CARE (SPRAY PLAN) ——— */
.care-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
@media (max-width: 900px) { .care-grid { grid-template-columns: 1fr; } }
.care-block { background: var(--bg-card); border: 1px solid var(--line); padding: 24px; border-radius: 3px; }
.care-block h3 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 20px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }

.ec-display { font-family: 'Fraunces', serif; font-size: 48px; font-weight: 300; color: var(--accent); line-height: 1; }
.ec-display input { font: inherit; color: inherit; border: none; background: transparent; width: 100px; outline: none; border-bottom: 1px dashed var(--line); }
.ec-sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-mute); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 4px; }

.spray-list { display: flex; flex-direction: column; gap: 10px; }
.spray-item {
  display: grid; grid-template-columns: 1fr auto auto; gap: 12px; align-items: center;
  padding: 12px; background: var(--bg); border: 1px solid var(--line-soft); border-radius: 2px;
}
.spray-item.suspended { opacity: 0.55; text-decoration: line-through; }
.spray-name { font-family: 'Fraunces', serif; font-weight: 500; font-size: 15px; }
.spray-freq { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent); letter-spacing: 0.1em; }
.spray-icon { cursor: pointer; color: var(--ink-mute); font-size: 14px; }
.spray-icon:hover { color: var(--rose); }

/* ——— SECTION: PHOTOS ——— */
.photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
.photo-tile { aspect-ratio: 1; background: var(--line-soft); border-radius: 3px; overflow: hidden; position: relative; cursor: pointer; }
.photo-tile img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
.photo-tile:hover img { transform: scale(1.05); }
.photo-caption { position: absolute; bottom: 0; left: 0; right: 0; padding: 8px 12px; background: linear-gradient(transparent, rgba(26,29,26,0.85)); color: white; font-family: 'JetBrains Mono', monospace; font-size: 10px; }
.photo-delete-btn { position: absolute; top: 8px; right: 8px; background: rgba(26,29,26,0.7); color: white; border: none; width: 24px; height: 24px; border-radius: 50%; cursor: pointer; opacity: 0; transition: opacity 0.2s; }
.photo-tile:hover .photo-delete-btn { opacity: 1; }
.photo-upload {
  aspect-ratio: 1; border: 1.5px dashed var(--line); display: flex; flex-direction: column;
  align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; background: var(--bg-card);
}
.photo-upload:hover { border-color: var(--accent); }
.photo-upload input { display: none; }

/* ——— MODAL ——— */
.modal-bg { position: fixed; inset: 0; background: rgba(26,29,26,0.5); backdrop-filter: blur(4px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-bg.active { display: flex; animation: fadeIn 0.2s; }
.modal {
  background: var(--bg-card); max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto;
  border: 1px solid var(--line); border-radius: 4px; padding: 36px;
}
.modal h2 { font-family: 'Fraunces', serif; font-weight: 400; font-style: italic; font-size: 32px; margin-bottom: 24px; letter-spacing: -0.01em; }
.field { margin-bottom: 20px; }
.field label { display: block; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 8px; }
.field input, .field textarea, .field select {
  width: 100%; padding: 10px 12px; border: 1px solid var(--line);
  background: var(--bg); font-family: 'Inter Tight', sans-serif; font-size: 14px;
  color: var(--ink); border-radius: 2px; outline: none; transition: border-color 0.2s;
}
.field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
.field textarea { min-height: 80px; resize: vertical; font-family: inherit; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.modal-foot { display: flex; justify-content: flex-end; gap: 8px; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--line-soft); }

.photo-modal img { max-width: 100%; max-height: 80vh; display: block; margin: 0 auto; }

/* ——— DASHBOARD ——— */
.dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-bottom: 32px; }
.dash-card { background: var(--bg-card); border: 1px solid var(--line); padding: 24px; border-radius: 3px; }
.dash-card-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.15em; color: var(--ink-mute); text-transform: uppercase; margin-bottom: 8px; }
.dash-card-value { font-family: 'Fraunces', serif; font-weight: 300; font-size: 40px; line-height: 1; letter-spacing: -0.02em; color: var(--accent); }
.dash-card-sub { font-size: 13px; color: var(--ink-soft); margin-top: 8px; }

.reminder-list { display: flex; flex-direction: column; gap: 10px; }
.reminder {
  display: grid; grid-template-columns: auto 1fr auto; gap: 16px; align-items: center;
  background: var(--bg-card); border-left: 3px solid var(--ochre); padding: 14px 18px; border-radius: 0 3px 3px 0;
}
.reminder.overdue { border-left-color: var(--rose); }
.reminder-days { font-family: 'Fraunces', serif; font-weight: 600; font-size: 22px; color: var(--ochre); line-height: 1; text-align: center; }
.reminder.overdue .reminder-days { color: var(--rose); }
.reminder-days span { display: block; font-family: 'JetBrains Mono', monospace; font-weight: 400; font-size: 9px; letter-spacing: 0.1em; color: var(--ink-mute); margin-top: 4px; text-transform: uppercase; }
.reminder-info { }
.reminder-flower { font-family: 'Fraunces', serif; font-weight: 500; font-size: 16px; }
.reminder-task { font-size: 13px; color: var(--ink-soft); }

/* ——— COMPARE ——— */
.compare-controls { display: flex; gap: 12px; margin-bottom: 24px; align-items: center; }
.compare-controls select { padding: 8px 12px; border: 1px solid var(--line); background: var(--bg-card); font-family: 'JetBrains Mono', monospace; font-size: 11px; border-radius: 2px; }
.compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
@media (max-width: 800px) { .compare-grid { grid-template-columns: 1fr; } }
.compare-col { background: var(--bg-card); border: 1px solid var(--line); padding: 24px; border-radius: 3px; }
.compare-season { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--line-soft); }

.empty-state { text-align: center; padding: 80px 20px; color: var(--ink-mute); }
.empty-state-icon { font-family: 'Fraunces', serif; font-size: 72px; color: var(--line); margin-bottom: 16px; }
.empty-state p { font-size: 14px; font-style: italic; }

.toast { position: fixed; bottom: 32px; right: 32px; background: var(--ink); color: var(--bg); padding: 12px 20px; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.1em; border-radius: 2px; z-index: 200; animation: slideUp 0.3s; text-transform: uppercase; }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

@media print {
  header.masthead, .tab-bar, .mast-actions, .detail-actions, .sub-tabs, .add-card, .back-btn, .note-composer, .tl-event-actions, .photo-upload, .photo-delete-btn, .btn { display: none !important; }
  body { background: white; }
  .flower-card, .dash-card, .side-panel, .note, .care-block, .compare-col { border: 1px solid #ccc; box-shadow: none; page-break-inside: avoid; }
}

/* ——— MOBILE ——— */
@media (max-width: 640px) {
  header.masthead { padding: 16px 16px 12px; }
  .mast-row { flex-direction: column; align-items: stretch; gap: 14px; }
  .brand-title { font-size: 34px; }
  .brand-sub { font-size: 10px; }
  .mast-actions { justify-content: flex-end; }
  .btn { padding: 9px 12px; font-size: 10px; }

  .tab-bar { padding: 8px 12px 0; overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; }
  .tab { padding: 12px 14px; font-size: 10px; flex-shrink: 0; }

  main { padding: 20px 16px; }
  .view-header { flex-direction: column; align-items: flex-start; gap: 8px; margin-bottom: 20px; padding-bottom: 14px; }
  .view-title { font-size: 24px; }

  .flower-grid { grid-template-columns: 1fr; gap: 14px; }
  .flower-card { min-height: auto; }
  .card-image { height: 140px; }
  .add-card { min-height: 180px; }
  .add-card-plus { font-size: 40px; }

  .detail-title-row { flex-direction: column; align-items: flex-start; gap: 14px; }
  .detail-name { font-size: 36px; }
  .detail-actions { width: 100%; }

  .sub-tabs { width: 100%; overflow-x: auto; flex-wrap: nowrap; }
  .sub-tab { flex-shrink: 0; padding: 8px 12px; }

  .timeline-wrap { grid-template-columns: 1fr; gap: 24px; }
  .side-panel { position: static; }
  .care-grid { grid-template-columns: 1fr; }
  .dash-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .dash-card { padding: 16px; }
  .dash-card-value { font-size: 28px; }

  .photo-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .compare-grid { grid-template-columns: 1fr; }
  .compare-controls { flex-wrap: wrap; }

  .modal { padding: 24px 20px; max-height: 95vh; }
  .modal h2 { font-size: 24px; margin-bottom: 18px; }
  .field-row { grid-template-columns: 1fr; gap: 0; }
  .modal-bg { padding: 10px; align-items: flex-end; }
  .modal { border-radius: 12px 12px 4px 4px; }

  .toast { bottom: 16px; right: 16px; left: 16px; text-align: center; }
}

/* Loading */
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--line); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<script>
// ═══════════════════════════════════════════════════════════════════════
// STATE + STORAGE
// ═══════════════════════════════════════════════════════════════════════
const STORAGE_KEY = 'flora:data:v1';
let state = { flowers: [] };
let currentFlowerId = null;
let editingEventId = null;
let editingSprayId = null;
let storageOK = true;

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function todayISO() { return new Date().toISOString().split('T')[0]; }
function weekOfYear(dateStr) {
  const d = new Date(dateStr);
  const start = new Date(d.getFullYear(), 0, 1);
  return Math.ceil((((d - start) / 86400000) + start.getDay() + 1) / 7);
}
function daysBetween(a, b) { return Math.round((new Date(b) - new Date(a)) / 86400000); }

async function loadState() {
  // Try cloud storage
  if (window.storage && typeof window.storage.get === 'function') {
    try {
      const res = await window.storage.get(STORAGE_KEY);
      if (res && res.value) {
        state = JSON.parse(res.value);
        if (!state.flowers) state.flowers = [];
        return;
      }
    } catch (e) {
      // Silent fallback to localStorage
    }
  }
  // Fallback: localStorage
  try {
    const ls = localStorage.getItem(STORAGE_KEY);
    if (ls) state = JSON.parse(ls);
  } catch (e) { /* silent */ }
  if (!state.flowers) state.flowers = [];
}

async function saveState() {
  const json = JSON.stringify(state);
  if (window.storage && typeof window.storage.set === 'function' && storageOK) {
    try {
      const res = await window.storage.set(STORAGE_KEY, json);
      if (res) {
        // Also keep localStorage backup silently
        try { localStorage.setItem(STORAGE_KEY, json); } catch (e) {}
        return;
      }
    } catch (e) {
      storageOK = false;
    }
  }
  // Fallback: localStorage only
  try {
    localStorage.setItem(STORAGE_KEY, json);
  } catch (e) {
    toast('Nepavyko išsaugoti');
  }
}

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ═══════════════════════════════════════════════════════════════════════
// IMAGE COMPRESSION (base64, constrained)
// ═══════════════════════════════════════════════════════════════════════
function compressImage(file, maxSize = 1200, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > h && w > maxSize) { h = (h * maxSize) / w; w = maxSize; }
        else if (h > maxSize) { w = (w * maxSize) / h; h = maxSize; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject; img.src = e.target.result;
    };
    reader.onerror = reject; reader.readAsDataURL(file);
  });
}

// ═══════════════════════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════════════════════
document.querySelectorAll('.tab-bar .tab').forEach(tab => {
  tab.addEventListener('click', () => switchTab(tab.dataset.tab));
});
function switchTab(name) {
  document.querySelectorAll('.tab-bar .tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('main > .view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  currentFlowerId = null;
  if (name === 'dashboard') renderDashboard();
  if (name === 'compare') renderCompare();
  if (name === 'flowers') renderFlowerGrid();
}

// ═══════════════════════════════════════════════════════════════════════
// FLOWER CRUD
// ═══════════════════════════════════════════════════════════════════════
function openFlowerModal(id = null) {
  editingEventId = id;
  if (id) {
    const f = state.flowers.find(x => x.id === id);
    document.getElementById('flowerModalTitle').textContent = 'Redaguoti: ' + f.name;
    document.getElementById('fName').value = f.name;
    document.getElementById('fSpecies').value = f.species || '';
    document.getElementById('fSeason').value = f.season || new Date().getFullYear();
    document.getElementById('fPlanted').value = f.plantedDate || '';
    document.getElementById('fEC').value = f.ec || '';
    document.getElementById('fDesc').value = f.description || '';
  } else {
    document.getElementById('flowerModalTitle').textContent = 'Nauja gėlė';
    ['fName','fSpecies','fPlanted','fEC','fDesc'].forEach(i => document.getElementById(i).value = '');
    document.getElementById('fSeason').value = new Date().getFullYear();
  }
  document.getElementById('flowerModal').classList.add('active');
}

async function saveFlower() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { toast('Pavadinimas būtinas'); return; }
  const data = {
    name,
    species: document.getElementById('fSpecies').value.trim(),
    season: document.getElementById('fSeason').value.trim() || String(new Date().getFullYear()),
    plantedDate: document.getElementById('fPlanted').value,
    ec: parseFloat(document.getElementById('fEC').value) || null,
    description: document.getElementById('fDesc').value.trim(),
  };
  if (editingEventId) {
    const f = state.flowers.find(x => x.id === editingEventId);
    Object.assign(f, data);
  } else {
    state.flowers.push({ id: uid(), ...data, coverPhoto: null, events: [], notes: [], sprays: [], photos: [], createdAt: todayISO() });
  }
  await saveState();
  editingEventId = null;
  closeModal('flowerModal');
  renderFlowerGrid();
  toast('Išsaugota');
}

async function deleteFlower(id) {
  if (!confirm('Ištrinti gėlę su visais duomenimis?')) return;
  state.flowers = state.flowers.filter(f => f.id !== id);
  await saveState();
  switchTab('flowers');
  toast('Ištrinta');
}

// ═══════════════════════════════════════════════════════════════════════
// RENDER: FLOWER GRID
// ═══════════════════════════════════════════════════════════════════════
function renderFlowerGrid() {
  const grid = document.getElementById('flowerGrid');
  document.getElementById('flowerCount').textContent = state.flowers.length;
  document.getElementById('flowerMeta').textContent = `— ${state.flowers.length} species · ${new Date().getFullYear()} season —`;
  document.getElementById('seasonLabel').textContent = `Season ${new Date().getFullYear()} · ${state.flowers.length} species tracked`;

  let html = state.flowers.map(f => {
    const photoCount = (f.photos || []).length;
    const lastNote = (f.notes && f.notes.length) ? new Date(f.notes[f.notes.length-1].date).toLocaleDateString('lt-LT') : '—';
    const cover = f.coverPhoto || (f.photos && f.photos[0] ? f.photos[0].data : null);
    return `
      <div class="flower-card" onclick="openFlower('${f.id}')">
        <div class="card-image ${cover ? '' : 'empty'}">
          ${cover ? `<img src="${cover}">` : ''}
        </div>
        <div class="card-body">
          <div class="card-species">${f.species || 'Species'} · ${f.season}</div>
          <div class="card-name">${f.name}</div>
          <div class="card-meta">
            <span><span class="card-dot"></span> ${(f.events || []).length} events</span>
            <span>📷 ${photoCount}</span>
            <span>EC ${f.ec ?? '—'}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');

  html += `
    <div class="flower-card add-card" onclick="openFlowerModal()">
      <div class="add-card-plus">+</div>
      <div class="add-card-text">Pridėti rūšį</div>
    </div>
  `;
  grid.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════════════
// RENDER: DETAIL VIEW
// ═══════════════════════════════════════════════════════════════════════
function openFlower(id) {
  currentFlowerId = id;
  document.querySelectorAll('main > .view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-detail').classList.add('active');
  document.querySelectorAll('.tab-bar .tab').forEach(t => t.classList.remove('active'));
  renderDetail();
}

function renderDetail() {
  const f = state.flowers.find(x => x.id === currentFlowerId);
  if (!f) { switchTab('flowers'); return; }
  const el = document.getElementById('view-detail');

  el.innerHTML = `
    <div class="detail-header">
      <button class="back-btn" onclick="switchTab('flowers')">← Grįžti į visas</button>
      <div class="detail-title-row">
        <div>
          <div class="detail-species">${f.species || '—'} · Season ${f.season}</div>
          <div class="detail-name"><span>${f.name}</span></div>
        </div>
        <div class="detail-actions">
          <button class="btn small" onclick="openFlowerModal('${f.id}')">Redaguoti</button>
          <button class="btn small danger" onclick="deleteFlower('${f.id}')">Ištrinti</button>
        </div>
      </div>
    </div>

    <div class="sub-tabs" id="subTabs">
      <div class="sub-tab active" data-sub="timeline">Timeline</div>
      <div class="sub-tab" data-sub="notes">Pastabos</div>
      <div class="sub-tab" data-sub="care">Priežiūra / Spray</div>
      <div class="sub-tab" data-sub="photos">Nuotraukos</div>
    </div>

    <div class="sub-view active" id="sub-timeline"></div>
    <div class="sub-view" id="sub-notes"></div>
    <div class="sub-view" id="sub-care"></div>
    <div class="sub-view" id="sub-photos"></div>
  `;

  el.querySelectorAll('.sub-tab').forEach(t => {
    t.addEventListener('click', () => {
      el.querySelectorAll('.sub-tab').forEach(x => x.classList.remove('active'));
      el.querySelectorAll('.sub-view').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      document.getElementById('sub-' + t.dataset.sub).classList.add('active');
    });
  });

  renderTimeline(f);
  renderNotes(f);
  renderCare(f);
  renderPhotos(f);
}

// ─── TIMELINE ───
function renderTimeline(f) {
  const events = [...(f.events || [])].sort((a, b) => (a.week || 999) - (b.week || 999));
  const firstBloom = events.find(e => /žied|bloom|pumpur|bud/i.test(e.title));
  const daysGrowing = f.plantedDate ? daysBetween(f.plantedDate, todayISO()) : 0;

  document.getElementById('sub-timeline').innerHTML = `
    <div class="timeline-wrap">
      <div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
          <h3 style="font-family:'Fraunces',serif;font-weight:500;font-size:22px">Augimo laikas</h3>
          <button class="btn small primary" onclick="openEventModal()">+ Įvykis</button>
        </div>
        <div class="timeline">
          ${events.length === 0 ? `<div class="empty-state"><div class="empty-state-icon">❦</div><p>Dar nėra įvykių. Pridėk pirmąjį.</p></div>` :
          events.map(e => `
            <div class="tl-event ${e.highlight ? 'highlight' : ''}">
              <div class="tl-event-week">Week ${e.week || '—'}</div>
              <div class="tl-event-title">${e.title}</div>
              ${e.description ? `<div class="tl-event-desc">${e.description}</div>` : ''}
              ${e.date ? `<div class="tl-event-date">${new Date(e.date).toLocaleDateString('lt-LT')}</div>` : ''}
              <div class="tl-event-actions">
                <span class="tl-link" onclick="openEventModal('${e.id}')">redaguoti</span>
                <span class="tl-link" onclick="deleteEvent('${e.id}')">trinti</span>
              </div>
            </div>
          `).join('')}
        </div>
      </div>

      <aside class="side-panel">
        <h3>Summary</h3>
        <div class="stat-row"><span class="stat-label">Sodinta</span><span class="stat-value">${f.plantedDate ? new Date(f.plantedDate).toLocaleDateString('lt-LT') : '—'}</span></div>
        <div class="stat-row"><span class="stat-label">Dienų augo</span><span class="stat-value">${daysGrowing || '—'}</span></div>
        <div class="stat-row"><span class="stat-label">Pirmas žydėjimas</span><span class="stat-value">${firstBloom ? 'Wk ' + firstBloom.week : '—'}</span></div>
        <div class="stat-row"><span class="stat-label">EC</span><span class="stat-value">${f.ec ?? '—'}</span></div>
        <div class="stat-row"><span class="stat-label">Įvykių</span><span class="stat-value">${events.length}</span></div>
        <div class="stat-row"><span class="stat-label">Nuotraukų</span><span class="stat-value">${(f.photos || []).length}</span></div>
        ${f.description ? `<div style="margin-top:16px;padding-top:16px;border-top:1px dashed var(--line-soft);font-size:13px;color:var(--ink-soft);line-height:1.5;font-style:italic">${f.description}</div>` : ''}
      </aside>
    </div>
  `;
}

function openEventModal(eventId = null) {
  editingEventId = eventId;
  if (eventId) {
    const f = state.flowers.find(x => x.id === currentFlowerId);
    const e = f.events.find(x => x.id === eventId);
    document.getElementById('eWeek').value = e.week || '';
    document.getElementById('eDate').value = e.date || '';
    document.getElementById('eTitle').value = e.title || '';
    document.getElementById('eDesc').value = e.description || '';
    document.getElementById('eHighlight').checked = !!e.highlight;
  } else {
    ['eWeek','eDate','eTitle','eDesc'].forEach(i => document.getElementById(i).value = '');
    document.getElementById('eHighlight').checked = false;
    document.getElementById('eDate').value = todayISO();
  }
  document.getElementById('eventModal').classList.add('active');
}

async function saveEvent() {
  const title = document.getElementById('eTitle').value.trim();
  if (!title) { toast('Pavadinimas būtinas'); return; }
  const f = state.flowers.find(x => x.id === currentFlowerId);
  let week = parseInt(document.getElementById('eWeek').value);
  const date = document.getElementById('eDate').value;
  if (!week && date) week = weekOfYear(date);
  const data = {
    week: week || null,
    date,
    title,
    description: document.getElementById('eDesc').value.trim(),
    highlight: document.getElementById('eHighlight').checked
  };
  if (editingEventId) {
    Object.assign(f.events.find(e => e.id === editingEventId), data);
  } else {
    f.events.push({ id: uid(), ...data });
  }
  await saveState();
  closeModal('eventModal');
  editingEventId = null;
  renderTimeline(f);
  toast('Išsaugota');
}

async function deleteEvent(id) {
  if (!confirm('Ištrinti įvykį?')) return;
  const f = state.flowers.find(x => x.id === currentFlowerId);
  f.events = f.events.filter(e => e.id !== id);
  await saveState();
  renderTimeline(f);
}

// ─── NOTES ───
function renderNotes(f) {
  const notes = [...(f.notes || [])].reverse();
  document.getElementById('sub-notes').innerHTML = `
    <div class="note-composer">
      <textarea id="noteText" placeholder="Pastebėjimas... pvz. Šiandien pastebėjau pirmas rožines spalvas ant Queen Ingrid, lapai vis dar šviesūs..."></textarea>
      <div class="composer-footer">
        <input type="date" id="noteDate" value="${todayISO()}">
        <button class="btn small primary" onclick="addNote()">+ Pridėti</button>
      </div>
    </div>
    <div class="note-list">
      ${notes.length === 0 ? `<div class="empty-state"><div class="empty-state-icon">✎</div><p>Dar nėra pastabų.</p></div>` :
      notes.map(n => `
        <div class="note">
          <div class="note-head">
            <div class="note-date">${new Date(n.date).toLocaleDateString('lt-LT', {weekday:'short', day:'numeric', month:'short', year:'numeric'})}</div>
            <span class="note-delete tl-link" onclick="deleteNote('${n.id}')">✕ trinti</span>
          </div>
          <div class="note-body">${n.text}</div>
        </div>
      `).join('')}
    </div>
  `;
}

async function addNote() {
  const text = document.getElementById('noteText').value.trim();
  if (!text) return;
  const f = state.flowers.find(x => x.id === currentFlowerId);
  if (!f.notes) f.notes = [];
  f.notes.push({ id: uid(), date: document.getElementById('noteDate').value || todayISO(), text });
  await saveState();
  renderNotes(f);
  toast('Pridėta');
}

async function deleteNote(id) {
  const f = state.flowers.find(x => x.id === currentFlowerId);
  f.notes = f.notes.filter(n => n.id !== id);
  await saveState();
  renderNotes(f);
}

// ─── CARE / SPRAY ───
function renderCare(f) {
  document.getElementById('sub-care').innerHTML = `
    <div class="care-grid">
      <div class="care-block">
        <h3>EC · Laistymas</h3>
        <div class="ec-display">EC <input id="ecInput" type="number" step="0.1" value="${f.ec ?? ''}" placeholder="1.7" onchange="updateEC(this.value)"></div>
        <div class="ec-sub">Electrical Conductivity</div>
        <div style="margin-top:20px;font-size:13px;color:var(--ink-soft);line-height:1.5">
          EC grupavimas padeda laistyti kelias rūšis su panašiais poreikiais kartu.
          ${f.ec ? `<br><br><strong>${f.name}</strong> yra EC ${f.ec} grupėje.` : ''}
        </div>
      </div>

      <div class="care-block">
        <h3>Purškimo planas <button class="btn small" onclick="openSprayModal()">+ Preparatas</button></h3>
        <div class="spray-list">
          ${(f.sprays || []).length === 0 ? `<div style="text-align:center;padding:32px;color:var(--ink-mute);font-style:italic;font-size:13px">Nėra preparatų</div>` :
          (f.sprays || []).map(s => `
            <div class="spray-item ${s.suspended ? 'suspended' : ''}">
              <div>
                <div class="spray-name">${s.name}</div>
                <div class="spray-freq">${s.frequency || ''}${s.interval ? ` · kas ${s.interval} d.` : ''}</div>
                ${s.notes ? `<div style="font-size:12px;color:var(--ink-mute);margin-top:4px">${s.notes}</div>` : ''}
              </div>
              <span class="spray-icon" onclick="markSprayed('${s.id}')" title="Pažymėti kad nupurkšta šiandien">✓</span>
              <span class="spray-icon" onclick="openSprayModal('${s.id}')" title="Redaguoti">✎</span>
            </div>
            ${s.lastSprayed ? `<div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent-soft);padding:0 12px;margin-top:-4px">Paskutinis: ${new Date(s.lastSprayed).toLocaleDateString('lt-LT')}</div>` : ''}
          `).join('')}
        </div>
      </div>
    </div>
  `;
}

async function updateEC(val) {
  const f = state.flowers.find(x => x.id === currentFlowerId);
  f.ec = parseFloat(val) || null;
  await saveState();
  toast('EC atnaujintas');
}

function openSprayModal(id = null) {
  editingSprayId = id;
  if (id) {
    const f = state.flowers.find(x => x.id === currentFlowerId);
    const s = f.sprays.find(x => x.id === id);
    document.getElementById('sName').value = s.name;
    document.getElementById('sFreq').value = s.frequency || '';
    document.getElementById('sInterval').value = s.interval || '';
    document.getElementById('sNotes').value = s.notes || '';
    document.getElementById('sSuspended').checked = !!s.suspended;
  } else {
    ['sName','sFreq','sInterval','sNotes'].forEach(i => document.getElementById(i).value = '');
    document.getElementById('sSuspended').checked = false;
  }
  document.getElementById('sprayModal').classList.add('active');
}

async function saveSpray() {
  const name = document.getElementById('sName').value.trim();
  if (!name) { toast('Pavadinimas būtinas'); return; }
  const f = state.flowers.find(x => x.id === currentFlowerId);
  if (!f.sprays) f.sprays = [];
  const data = {
    name,
    frequency: document.getElementById('sFreq').value.trim(),
    interval: parseInt(document.getElementById('sInterval').value) || null,
    notes: document.getElementById('sNotes').value.trim(),
    suspended: document.getElementById('sSuspended').checked
  };
  if (editingSprayId) {
    Object.assign(f.sprays.find(s => s.id === editingSprayId), data);
  } else {
    f.sprays.push({ id: uid(), ...data, lastSprayed: null });
  }
  await saveState();
  closeModal('sprayModal');
  editingSprayId = null;
  renderCare(f);
  toast('Išsaugota');
}

async function markSprayed(id) {
  const f = state.flowers.find(x => x.id === currentFlowerId);
  const s = f.sprays.find(x => x.id === id);
  s.lastSprayed = todayISO();
  await saveState();
  renderCare(f);
  toast(`${s.name} pažymėta šiandien`);
}

// ─── PHOTOS ───
function renderPhotos(f) {
  const photos = f.photos || [];
  document.getElementById('sub-photos').innerHTML = `
    <div class="photo-grid">
      <label class="photo-upload">
        <input type="file" accept="image/*" multiple onchange="uploadPhotos(event)">
        <div style="font-family:'Fraunces',serif;font-size:40px;color:var(--ink-mute);line-height:1">+</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--ink-mute);margin-top:8px;text-align:center;padding:0 8px">Įkelti nuotrauką</div>
      </label>
      ${photos.map(p => `
        <div class="photo-tile">
          <img src="${p.data}" onclick="openPhotoModal('${p.id}')">
          ${p.caption ? `<div class="photo-caption">${p.caption}</div>` : `<div class="photo-caption">${new Date(p.date).toLocaleDateString('lt-LT')}</div>`}
          <button class="photo-delete-btn" onclick="event.stopPropagation(); deletePhoto('${p.id}')" title="Ištrinti">✕</button>
        </div>
      `).join('')}
    </div>
  `;
}

async function uploadPhotos(event) {
  const files = Array.from(event.target.files);
  if (!files.length) return;
  const f = state.flowers.find(x => x.id === currentFlowerId);
  if (!f.photos) f.photos = [];
  toast(`Įkeliama ${files.length} nuotr...`);
  for (const file of files) {
    try {
      const data = await compressImage(file);
      const caption = prompt('Aprašymas (nebūtina):', '') || '';
      f.photos.push({ id: uid(), data, caption, date: todayISO() });
      if (!f.coverPhoto) f.coverPhoto = data;
    } catch (e) { console.error(e); toast('Klaida kraunant'); }
  }
  await saveState();
  renderPhotos(f);
  toast('Nuotraukos įkeltos');
}

function openPhotoModal(id) {
  const f = state.flowers.find(x => x.id === currentFlowerId);
  const p = f.photos.find(x => x.id === id);
  document.getElementById('photoModalImg').src = p.data;
  document.getElementById('photoModalCaption').textContent = `${p.caption || ''} · ${new Date(p.date).toLocaleDateString('lt-LT')}`;
  document.getElementById('photoModal').classList.add('active');
}

async function deletePhoto(id) {
  if (!confirm('Ištrinti nuotrauką?')) return;
  const f = state.flowers.find(x => x.id === currentFlowerId);
  const p = f.photos.find(x => x.id === id);
  if (f.coverPhoto === p.data) f.coverPhoto = null;
  f.photos = f.photos.filter(x => x.id !== id);
  await saveState();
  renderPhotos(f);
}

// ═══════════════════════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════════════════════
function renderDashboard() {
  document.getElementById('dashDate').textContent = new Date().toLocaleDateString('lt-LT', {weekday:'long', day:'numeric', month:'long', year:'numeric'});

  const totalFlowers = state.flowers.length;
  const totalPhotos = state.flowers.reduce((a, f) => a + (f.photos?.length || 0), 0);
  const totalEvents = state.flowers.reduce((a, f) => a + (f.events?.length || 0), 0);
  const activeSprays = state.flowers.reduce((a, f) => a + (f.sprays?.filter(s => !s.suspended).length || 0), 0);

  document.getElementById('dashStats').innerHTML = `
    <div class="dash-card"><div class="dash-card-label">Rūšys</div><div class="dash-card-value">${totalFlowers}</div><div class="dash-card-sub">sezone ${new Date().getFullYear()}</div></div>
    <div class="dash-card"><div class="dash-card-label">Įvykiai</div><div class="dash-card-value">${totalEvents}</div><div class="dash-card-sub">timeline entries</div></div>
    <div class="dash-card"><div class="dash-card-label">Nuotraukos</div><div class="dash-card-value">${totalPhotos}</div><div class="dash-card-sub">archive</div></div>
    <div class="dash-card"><div class="dash-card-label">Aktyvūs purškimai</div><div class="dash-card-value">${activeSprays}</div><div class="dash-card-sub">across species</div></div>
  `;

  // Reminders
  const today = todayISO();
  const reminders = [];
  state.flowers.forEach(f => {
    (f.sprays || []).forEach(s => {
      if (s.suspended || !s.interval) return;
      let daysUntil;
      if (s.lastSprayed) {
        const nextDate = new Date(s.lastSprayed);
        nextDate.setDate(nextDate.getDate() + s.interval);
        daysUntil = daysBetween(today, nextDate.toISOString().split('T')[0]);
      } else {
        daysUntil = 0; // never sprayed = do now
      }
      reminders.push({
        flower: f.name,
        flowerId: f.id,
        task: s.name,
        frequency: s.frequency,
        daysUntil,
        overdue: daysUntil < 0
      });
    });
  });
  reminders.sort((a, b) => a.daysUntil - b.daysUntil);
  const upcoming = reminders.filter(r => r.daysUntil <= 7);

  document.getElementById('reminderList').innerHTML = upcoming.length === 0 ?
    `<div class="empty-state"><div class="empty-state-icon">✓</div><p>Visi purškimai atlikti. Artimiausių nėra.</p></div>` :
    upcoming.map(r => `
      <div class="reminder ${r.overdue ? 'overdue' : ''}" onclick="openFlower('${r.flowerId}')">
        <div class="reminder-days">
          ${r.overdue ? Math.abs(r.daysUntil) : r.daysUntil}
          <span>${r.overdue ? 'overdue' : r.daysUntil === 0 ? 'šiandien' : 'dienų'}</span>
        </div>
        <div class="reminder-info">
          <div class="reminder-flower">${r.flower}</div>
          <div class="reminder-task">${r.task} · ${r.frequency || ''}</div>
        </div>
        <div style="color:var(--ink-mute);font-size:18px">›</div>
      </div>
    `).join('');
}

// ═══════════════════════════════════════════════════════════════════════
// COMPARE
// ═══════════════════════════════════════════════════════════════════════
function renderCompare() {
  const flowerSel = document.getElementById('compareFlower');
  const yearA = document.getElementById('compareYearA');
  const yearB = document.getElementById('compareYearB');

  // Group by name
  const byName = {};
  state.flowers.forEach(f => { if (!byName[f.name]) byName[f.name] = []; byName[f.name].push(f); });
  const names = Object.keys(byName).sort();

  flowerSel.innerHTML = names.length ? names.map(n => `<option value="${n}">${n}</option>`).join('') : `<option>— Nėra rūšių —</option>`;

  const updateYears = () => {
    const name = flowerSel.value;
    const seasons = (byName[name] || []).map(f => f.season).sort();
    yearA.innerHTML = seasons.map(s => `<option value="${s}">${s}</option>`).join('');
    yearB.innerHTML = seasons.map(s => `<option value="${s}">${s}</option>`).join('');
    if (seasons.length >= 2) { yearA.value = seasons[seasons.length - 2]; yearB.value = seasons[seasons.length - 1]; }
    renderCompareCols();
  };

  const renderCompareCols = () => {
    const name = flowerSel.value;
    const a = (byName[name] || []).find(f => f.season === yearA.value);
    const b = (byName[name] || []).find(f => f.season === yearB.value);
    document.getElementById('compareGrid').innerHTML = `
      ${renderSeasonCol(a, yearA.value)}
      ${renderSeasonCol(b, yearB.value)}
    `;
  };

  flowerSel.onchange = updateYears;
  yearA.onchange = renderCompareCols;
  yearB.onchange = renderCompareCols;
  if (names.length) updateYears();
  else document.getElementById('compareGrid').innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">❦</div><p>Pridėk gėles su skirtingais sezonais palyginimui.</p></div>`;
}

function renderSeasonCol(f, season) {
  if (!f) return `<div class="compare-col"><div class="compare-season">Sezonas ${season}</div><div class="empty-state"><p>Nėra duomenų</p></div></div>`;
  const firstBloom = (f.events || []).find(e => /žied|bloom|pumpur|bud/i.test(e.title));
  return `
    <div class="compare-col">
      <div class="compare-season">Sezonas ${season}</div>
      <div class="stat-row"><span class="stat-label">Sodinta</span><span class="stat-value">${f.plantedDate || '—'}</span></div>
      <div class="stat-row"><span class="stat-label">Pirmas žydėjimas</span><span class="stat-value">${firstBloom ? 'Wk ' + firstBloom.week : '—'}</span></div>
      <div class="stat-row"><span class="stat-label">EC</span><span class="stat-value">${f.ec ?? '—'}</span></div>
      <div class="stat-row"><span class="stat-label">Įvykių</span><span class="stat-value">${(f.events || []).length}</span></div>
      <div class="stat-row"><span class="stat-label">Purškimų sistemoje</span><span class="stat-value">${(f.sprays || []).length}</span></div>
      <div style="margin-top:20px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:12px">Timeline</div>
      ${(f.events || []).sort((a,b) => (a.week||999) - (b.week||999)).map(e => `
        <div style="padding:10px 0;border-bottom:1px dashed var(--line-soft);font-size:13px">
          <span style="font-family:'JetBrains Mono',monospace;color:var(--accent);font-size:11px;margin-right:8px">Wk ${e.week || '—'}</span>
          ${e.title}
          ${e.description ? `<div style="font-size:12px;color:var(--ink-soft);margin-top:2px">${e.description}</div>` : ''}
        </div>
      `).join('')}
    </div>
  `;
}
